name: E2E

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - staging

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.DATABASE_URL_TEST || 'sqlite::memory:' }}
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-e2e-secret-key-min-32-chars-long' }}
      VITE_API_URL: http://localhost:3000
      FRONTEND_URL: http://localhost:4173
      CORS_ORIGIN: http://localhost:4173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # ---- Backend setup ----------------------------------

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --ignore-scripts

      - name: Build sqlite3 for E2E
        working-directory: backend
        run: |
          node_modules/.bin/node-gyp rebuild \
            --directory node_modules/sqlite3 \
            --nodedir /usr \
          2>/dev/null || npm rebuild sqlite3 2>/dev/null || true

      - name: Start backend server
        working-directory: backend
        run: |
          # Redirigir stdout+stderr a log file para diagnóstico de crashes.
          npx tsx src/index.ts > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/categories > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              break
            fi
            echo "Waiting for backend... (${i}s)"
            sleep 1
          done
          curl -sf http://localhost:3000/api/categories || (echo "Backend failed to start"; cat /tmp/backend.log; exit 1)

      # ---- Frontend setup ---------------------------------

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000

      - name: Start frontend preview server
        working-directory: frontend
        run: |
          npx vite preview --port 4173 &
          for i in $(seq 1 20); do
            if curl -sf http://localhost:4173 > /dev/null 2>&1; then
              echo "Frontend ready after ${i}s"
              break
            fi
            echo "Waiting for frontend... (${i}s)"
            sleep 1
          done
          curl -sf http://localhost:4173 || (echo "Frontend failed to start" && exit 1)

      # ---- Playwright -----------------------------------------

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # Crear directorio para el storageState del global setup
      - name: Create auth directory
        working-directory: frontend
        run: mkdir -p src/tests/e2e/.auth

      - name: Run smoke tests
        working-directory: frontend
        run: npx playwright test e2e/smoke.spec.ts --reporter=list

      - name: Run auth E2E tests
        working-directory: frontend
        run: npx playwright test e2e/auth.spec.ts --reporter=list

      - name: Run inventory E2E tests
        working-directory: frontend
        run: npx playwright test e2e/inventory.spec.ts --reporter=list

      # ---- Diagnóstico ------------------------------------

      - name: Show backend logs (always)
        if: always()
        run: |
          echo "=== BACKEND LOGS ==="
          cat /tmp/backend.log || echo "(no backend log found)"
          echo "=== BACKEND PROCESS STATUS ==="
          if [ -f /tmp/backend.pid ]; then
            PID=$(cat /tmp/backend.pid)
            kill -0 $PID 2>/dev/null && echo "Backend still alive (PID $PID)" || echo "Backend DEAD (PID $PID)"
          fi

      # ---- Artifacts ------------------------------------------

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload backend log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-log
          path: /tmp/backend.log
          retention-days: 7

      - name: Upload Playwright traces (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7
