# ============================================================
# CI PIPELINE — Streamline
# ============================================================

name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend — Lint, Test & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build sqlite3 native module
        run: |
          node_modules/.bin/node-gyp rebuild \
            --directory node_modules/sqlite3 \
            --nodedir /usr \
          || echo "node-gyp rebuild failed — trying npm rebuild"
          npm rebuild sqlite3 --ignore-scripts=false 2>/dev/null || true

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Run tests
        env:
          NODE_ENV: test
          DATABASE_URL: "sqlite::memory:"
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'ci-test-secret-key-min-32-chars-long' }}
        run: npm test

      - name: Generate coverage report
        env:
          NODE_ENV: test
          DATABASE_URL: "sqlite::memory:"
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'ci-test-secret-key-min-32-chars-long' }}
        run: |
          npx c8 \
            --reporter=text \
            --reporter=lcov \
            --reporter=json-summary \
            --exclude="src/tests/**" \
            --exclude="src/config/db.ts" \
            node --import tsx/esm \
              --test \
              src/tests/integration/**/*.test.ts \
              src/tests/unit/**/*.test.ts

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: backend
          flags: backend
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  frontend-ci:
    name: Frontend — Lint, Type-check, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint:ci

      - name: Type check
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Run tests with coverage
        run: npm run coverage
        env:
          VITE_API_URL: http://localhost:3000

      - name: Check coverage thresholds
        run: |
          node -e "
          const fs = require('fs');
          const path = 'coverage/coverage-summary.json';
          if (!fs.existsSync(path)) { console.log('No coverage file'); process.exit(0); }
          const c = JSON.parse(fs.readFileSync(path));
          const total = c.total;
          const lines = total.lines.pct;
          const functions = total.functions.pct;
          console.log('Lines:    ', lines + '%');
          console.log('Functions:', functions + '%');
          if (lines < 70 || functions < 70) {
            console.error('Coverage below threshold (70%)');
            process.exit(1);
          }
          console.log('Coverage OK');
          "

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: frontend
          flags: frontend
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://placeholder-api.onrender.com

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 1

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          echo "Backend CI: ${{ needs.backend-ci.result }}"
          echo "Frontend CI: ${{ needs.frontend-ci.result }}"
          if [[ "${{ needs.backend-ci.result }}" != "success" ]] || \
             [[ "${{ needs.frontend-ci.result }}" != "success" ]]; then
            echo "Quality gate FAILED — one or more CI jobs did not pass"
            exit 1
          fi
          echo "Quality gate PASSED"
