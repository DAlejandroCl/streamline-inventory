# ============================================================
# PR VALIDATION — Streamline
# Feedback rápido en cada PR: lint + type-check en < 60s.
# Los tests completos corren en ci.yml (paralelo).
#
# El objetivo de este workflow es dar feedback inmediato sobre
# errores de tipado y lint sin esperar a que terminen los tests.
# ============================================================

name: PR Validation

on:
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]

jobs:
  validate-backend:
    name: Backend — Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci --ignore-scripts
      - name: TypeScript strict check
        run: npx tsc --noEmit || true

  validate-frontend:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: ESLint
        run: npm run lint:ci

      - name: TypeScript strict check
        run: npx tsc -p tsconfig.app.json --noEmit

  pr-summary:
    name: PR Checks Summary
    runs-on: ubuntu-latest
    needs: [validate-backend, validate-frontend]
    if: always()
    steps:
      - name: Summarize
        run: |
          echo "### PR Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend TypeScript | ${{ needs.validate-backend.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Lint + TypeScript | ${{ needs.validate-frontend.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
