# ============================================================
# COVERAGE REPORT — Streamline
# Genera reporte de cobertura y lo postea como comentario en PR.
#
# Se ejecuta sólo en pull_request para dar feedback al autor
# antes del merge.
# ============================================================

name: Coverage Report

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  coverage-comment:
    name: Post Coverage Summary
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ---- Backend coverage --------------------------------

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --ignore-scripts

      - name: Build sqlite3
        working-directory: backend
        run: |
          node_modules/.bin/node-gyp rebuild \
            --directory node_modules/sqlite3 \
            --nodedir /usr \
          2>/dev/null || true

      - name: Backend coverage
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: sqlite::memory:
          JWT_SECRET: ci-coverage-secret-key-min-32-chars
        run: |
          npx c8 \
            --reporter=json-summary \
            --exclude="src/tests/**" \
            node --import tsx/esm \
              --test \
              src/tests/integration/**/*.test.ts \
              src/tests/unit/**/*.test.ts \
          2>/dev/null || true

      # ---- Frontend coverage --------------------------------

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend coverage
        working-directory: frontend
        run: npm run coverage 2>/dev/null || true
        env:
          VITE_API_URL: http://localhost:3000

      # ---- Build coverage comment -------------------------

      - name: Build coverage summary
        id: coverage
        run: |
          BE_LINES="N/A"
          BE_FUNCTIONS="N/A"
          FE_LINES="N/A"
          FE_FUNCTIONS="N/A"

          if [ -f backend/coverage/coverage-summary.json ]; then
            BE_LINES=$(node -e "const c=require('./backend/coverage/coverage-summary.json'); console.log(c.total.lines.pct+'%')" 2>/dev/null || echo "N/A")
            BE_FUNCTIONS=$(node -e "const c=require('./backend/coverage/coverage-summary.json'); console.log(c.total.functions.pct+'%')" 2>/dev/null || echo "N/A")
          fi

          if [ -f frontend/coverage/coverage-summary.json ]; then
            FE_LINES=$(node -e "const c=require('./frontend/coverage/coverage-summary.json'); console.log(c.total.lines.pct+'%')" 2>/dev/null || echo "N/A")
            FE_FUNCTIONS=$(node -e "const c=require('./frontend/coverage/coverage-summary.json'); console.log(c.total.functions.pct+'%')" 2>/dev/null || echo "N/A")
          fi

          echo "be_lines=$BE_LINES" >> $GITHUB_OUTPUT
          echo "be_functions=$BE_FUNCTIONS" >> $GITHUB_OUTPUT
          echo "fe_lines=$FE_LINES" >> $GITHUB_OUTPUT
          echo "fe_functions=$FE_FUNCTIONS" >> $GITHUB_OUTPUT

      - name: Post coverage comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## 📊 Coverage Report',
              '',
              '| Module    | Lines | Functions | Threshold |',
              '|-----------|-------|-----------|-----------|',
              `| Backend   | ${{ steps.coverage.outputs.be_lines }} | ${{ steps.coverage.outputs.be_functions }} | ≥ 70% |`,
              `| Frontend  | ${{ steps.coverage.outputs.fe_lines }} | ${{ steps.coverage.outputs.fe_functions }} | ≥ 70% |`,
              '',
              '_Generated by [Coverage Report workflow](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions)_',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            // Actualizar comentario existente en lugar de crear uno nuevo
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Coverage Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
